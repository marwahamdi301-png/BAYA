<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAYA EMPIRE | JAMEL CHABANI</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* كراسة الشروط: التصميم الملكي (أسود وذهبي) */
        :root { --gold: #D4AF37; --black: #0a0a0a; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: sans-serif; margin: 0; text-align: center; }
        .header { border-bottom: 2px solid var(--gold); padding: 20px; background: #111; }
        .founder { color: var(--gold); font-size: 1.4rem; font-weight: bold; }
        .card { background: #1a1a1a; margin: 15px; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .lang-btn { font-size: 1.5rem; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="founder">JAMEL CHABANI</div>
        <small>BAYA EMPIRE FOUNDER</small>
    </div>

    <div class="card">
        <span class="lang-btn" onclick="setLang('ar')">🇩🇿</span>
        <span class="lang-btn" onclick="setLang('vi')">🇻🇳</span>
        <span class="lang-btn" onclick="setLang('id')">🇮🇩</span>
    </div>

    <div class="card">
        <h3 id="kyc-title">حلول KYC 🛡️</h3>
        <p id="kyc-desc">مركز دعم المعدنين بدون نود لتجاوز مشاكل التوثيق.</p>
        <button class="btn" onclick="showHelp()">فتح الدليل المترجم</button>
    </div>

    <div class="card">
        <h3>رادار الإمبراطورية 📡</h3>
        <div style="display: flex; justify-content: space-around; font-size: 2rem;">
            <a href="https://x.com" style="color: var(--gold);"><i class="fab fa-x-twitter"></i></a>
            <a href="https://tiktok.com" style="color: var(--gold);"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <script>
        // نظام الترجمة والتحكم
        function setLang(lang) {
            const t = {
                ar: { title: "حلول KYC 🛡️", desc: "دعم المعدنين العرب لتجاوز مشاكل التوثيق." },
                vi: { title: "Giải pháp KYC 🇻🇳", desc: "Hỗ trợ thợ đào Việt Nam vượt qua lỗi xác minh." },
                id: { title: "Solusi KYC 🇮🇩", desc: "Dukungan penambang Indonesia untuk verifikasi." }
            };
            document.getElementById('kyc-title').innerText = t[lang].title;
            document.getElementById('kyc-desc').innerText = t[lang].desc;
        }
        function showHelp() { alert("جاري تحميل الدليل المخصص لهاتفك..."); }
        
        // تفعيل الربط مع شبكة باي
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</body>
</html>
