<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BAYA EMPIRE</title>
    <style>
        body { 
            background: #000; color: #D4AF37; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
            overflow-x: hidden;
        }
        .header { border-bottom: 2px solid #D4AF37; padding: 20px 0; margin-bottom: 30px; }
        .logo { font-size: 2.2em; font-weight: bold; }
        .founder { font-size: 0.9em; color: #fff; opacity: 0.8; }
        
        .card { 
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid #D4AF37; border-radius: 15px;
            padding: 25px; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        
        .balance-value { font-size: 2.5em; color: #fff; margin: 15px 0; font-weight: bold; }
        
        button {
            background: linear-gradient(to bottom, #D4AF37, #B8860B);
            color: #000; border: none; padding: 18px; border-radius: 50px;
            width: 100%; font-weight: bold; font-size: 1.2em; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* شريط الأخبار المتحرك */
        .news-ticker {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(212, 175, 55, 0.1);
            border-top: 1px solid #D4AF37;
            white-space: nowrap; overflow: hidden; padding: 10px 0;
            color: #fff; font-size: 0.9em;
        }
        .news-content {
            display: inline-block; animation: scroll 20s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🔱 BAYA EMPIRE 🔱</div>
        <div class="founder">FOUNDER: JAMEL CHABANI</div>
    </div>

    <div class="card">
        <h3 style="margin: 0;">المحفظة الملكية (Pi Wallet)</h3>
        <div class="balance-value" id="wallet-balance">0.00 Pi</div>
        <button style="width:auto; padding: 8px 15px; font-size: 0.8em;" onclick="syncWallet()">🔄 تحديث الرصيد</button>
    </div>

    <div class="card">
        <p id="market-status" style="color: #00ff00; font-weight: bold;">حالة السوق: انتظار الأمر...</p>
        <button onclick="startBot()">تفعيل المحرك الذكي</button>
    </div>

    <div class="news-ticker">
        <div class="news-content" id="news-text">
            جاري جلب آخر أخبار Pi Network... السعر العالمي مستقر... نظام BAYA مؤمن بالكامل...
        </div>
    </div>

    <script src="bot-core.js"></script>
</body>
</html>
